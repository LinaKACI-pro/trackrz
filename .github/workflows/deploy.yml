name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hetzner
  cancel-in-progress: true

jobs:
  deploy:
    name: Test and deploy
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/trackerz' }}
      SSH_PORT: ${{ vars.HETZNER_PORT || '22' }}
      ZIG_TARGET: ${{ vars.ZIG_TARGET || 'x86_64-linux-musl' }}
      APP_PASSWORD: ${{ secrets.MUSCU_PASSWORD || vars.MUSCU_PASSWORD || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Run JavaScript tests
        run: node --test tests/*.test.mjs

      - name: Run Zig tests
        run: zig test backend/src/document.zig -O ReleaseSafe

      - name: Build Zig backend
        run: zig build-exe backend/src/main.zig -target "$ZIG_TARGET" -O ReleaseSafe -fstrip -femit-bin=trackrz-server

      - name: Validate deployment configuration
        run: |
          test -n "${{ secrets.HETZNER_HOST }}" || (echo "Missing secret: HETZNER_HOST" && exit 1)
          test -n "${{ secrets.HETZNER_USER }}" || (echo "Missing secret: HETZNER_USER" && exit 1)
          test -n "${{ secrets.HETZNER_SSH_KEY }}" || (echo "Missing secret: HETZNER_SSH_KEY" && exit 1)

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" "mkdir -p '$DEPLOY_PATH'"

      - name: Sync application files
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.idea/' \
            --exclude '__pycache__/' \
            --exclude '.pytest_cache/' \
            --exclude 'backup/' \
            --exclude 'benchmarks/' \
            --exclude 'data/' \
            --exclude '*.pyc' \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            ./ "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:$DEPLOY_PATH/"

      - name: Make backend executable
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" "chmod 755 '$DEPLOY_PATH/trackrz-server'"

      - name: Configure Zig systemd service
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" "sudo mkdir -p /etc/systemd/system/muscu.service.d"
          printf '%s\n' \
            '[Service]' \
            'ExecStart=' \
            "ExecStart=$DEPLOY_PATH/trackrz-server" \
            "WorkingDirectory=$DEPLOY_PATH" \
            'Environment=' \
            'Environment=HOST=127.0.0.1' \
            'Environment=PORT=8000' \
            'UnsetEnvironment=MUSCU_PASSWORD' \
            'ReadWritePaths=' \
            "ReadWritePaths=$DEPLOY_PATH/data" \
            | ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" "sudo tee /etc/systemd/system/muscu.service.d/zig.conf >/dev/null"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" "sudo systemctl daemon-reload"

      - name: Configure application password
        if: env.APP_PASSWORD != ''
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" "APP_USER=\$(systemctl show -p User --value muscu); test -n \"\$APP_USER\" || APP_USER=root; APP_GROUP=\$(id -gn \"\$APP_USER\"); sudo install -d -m 700 -o \"\$APP_USER\" -g \"\$APP_GROUP\" '$DEPLOY_PATH/data'"
          printf '%s' "$APP_PASSWORD" | ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" "sudo tee '$DEPLOY_PATH/data/password.txt' >/dev/null"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" "APP_USER=\$(systemctl show -p User --value muscu); test -n \"\$APP_USER\" || APP_USER=root; APP_GROUP=\$(id -gn \"\$APP_USER\"); sudo chown \"\$APP_USER:\$APP_GROUP\" '$DEPLOY_PATH/data/password.txt'; sudo chmod 600 '$DEPLOY_PATH/data/password.txt'"

      - name: Restart service
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" "if command -v sudo >/dev/null 2>&1; then sudo systemctl restart muscu; else systemctl restart muscu; fi"

      - name: Verify Zig backend is active
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" "systemctl show -p ExecStart --value muscu | grep -F '$DEPLOY_PATH/trackrz-server'"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" "pgrep -af '$DEPLOY_PATH/trackrz-server'"
